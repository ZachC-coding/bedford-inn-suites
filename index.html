<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedford Inn & Suites | Under Maintenance</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f7f7f7;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }

        .container {
            max-width: 700px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #1f2937;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 1rem;
        }

        .contact {
            margin-top: 2rem;
            font-weight: bold;
        }

        .logo {
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 2rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Bedford Inn & Suites</div>

        <h1>We're Updating Our Website</h1>

        <p>
            Our website is currently undergoing maintenance and improvements.
        </p>

        <p>
            We apologize for any inconvenience and appreciate your patience.
            Please check back soon for updates.
        </p>

        <div class="contact">
            For reservations or questions, please contact the hotel directly.
        </div>
    </div>
</body>
</html>
